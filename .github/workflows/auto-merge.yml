name: Auto-merge Approved PRs

on:
  projects_v2_item:
    types: [edited]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.changes.field_value != null
    steps:
      - name: Merge PR if status is Approved
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          ITEM_NODE_ID: ${{ github.event.projects_v2_item.node_id }}
        run: |
          STATUS=$(gh api graphql -f query='
            query($id: ID!) {
              node(id: $id) {
                ... on ProjectV2Item {
                  fieldValueByName(name: "Status") {
                    ... on ProjectV2ItemFieldSingleSelectValue { name }
                  }
                }
              }
            }
          ' -f id="$ITEM_NODE_ID" --jq '.data.node.fieldValueByName.name // ""')

          if [ "$STATUS" != "Approved" ]; then
            echo "Status is '$STATUS' — skipping"
            exit 0
          fi

          ISSUE_NUMBER=$(gh api graphql -f query='
            query($id: ID!) {
              node(id: $id) {
                ... on ProjectV2Item {
                  content {
                    ... on Issue { number }
                  }
                }
              }
            }
          ' -f id="$ITEM_NODE_ID" --jq '.data.node.content.number // 0')

          if [ "$ISSUE_NUMBER" -eq 0 ]; then
            echo "Item is not an issue — skipping"
            exit 0
          fi

          REPO="${{ github.repository }}"

          PR_NUMBER=$(gh pr list --repo "$REPO" \
            --search "closes #$ISSUE_NUMBER in:body" \
            --state open --json number --jq '.[0].number // 0')

          if [ "$PR_NUMBER" -eq 0 ]; then
            PR_NUMBER=$(gh pr list --repo "$REPO" \
              --search "#$ISSUE_NUMBER" \
              --state open --json number --jq '.[0].number // 0')
          fi

          if [ "$PR_NUMBER" -eq 0 ]; then
            echo "No open PR found for issue #$ISSUE_NUMBER — skipping"
            exit 0
          fi

          echo "Merging PR #$PR_NUMBER for issue #$ISSUE_NUMBER"
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch
